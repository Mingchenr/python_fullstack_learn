<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>添加物料</title>
    <style>
        body {font-family:Arial,sans-serif;margin:20px;}
        .form {max-width:500px; margin :0 auto;}
        .form-item {margin :10px 0;}
        label {display:inline-block; width:120px }
        input,select {padding:6px width:300px; }
        button { padding:8px 20px;background-color:#28a745 ;color:#fff;border :none;border-radius:4px;cursor:pointer;}
        .back { margin-top : 20px;}
    </style>
</head>
<body>
    <div class="form">
        <h1>添加气动打包机物料</h1>

        <!-- 消息提示 -->
        {% if messages %}
            {% for msg in messages %}
                <div class="messages {{msg.tags}}">{{msg}}</div>
            {% endfor %}
        {% endif %}
        <form method="post" enctype="multipart/form-data" onsubmit="return checkForm()">
            <script>
                function checkForm() {
                    const machineName = document.querySelector('input[name="machine_name"]').value;
                    const drawingNo = document.querySelector('input[name="drawing_no"]').value;
                    if (!machineName || !drawingNo) {
                        alert('零件名称和图号不能为空！');
                        return false;
                    }
                    return true;
                }
            </script>
            {% csrf_token %}

            <div class="form-item">
                <label>物料编码:</label>
                <input type="text" name="material_code" required>
            </div>
            <div class="form-item">
                <label>图号:</label>
                <input type="text" name="drawing_no" required>

            </div>
            <div class="form-item">
                <label>规格:</label>
                <input type="text" name="standards" placeholder="如M5*30">
            </div>
            <div class="form-item">
                <label>零件名称:</label>
                <input type="text" name="machine_name" required>
            </div>
            <div class="form-item">
                <label>进货价格:</label>
                <input type="number" step="0.01" name="purchase_price" placeholder="单位:元">
            </div>
            <div class="form-item">
                <label>售价:</label>
                <input type="number" step="0.01" name="selling_price" placeholder="单位:元">
            </div>
            <div class="form-item">
                <label>所属机型:</label>
                <select  name="model_type">

                    <option value="XQD-19气动打包机" >XQD-19气动打包机</option>
                    <option value="XQD-25气动打包机" >XQD-25气动打包机</option>
                    <option value="GSC32气动打包机" >GSC32气动打包机</option>
                    <option value="GSC32气动卡扣机" >GSC32气动卡扣机</option>
                    <option value="KCL气动打包机" >KCL气动打包机</option>
                    <option value="KCL气动卡扣机" >KCL气动卡扣机</option>
                    <option value="FTL32气动打包机" >FTL32气动打包机</option>
                    <option value="FTL32气动卡扣机" >FTL32气动卡扣机</option>

                </select>
            </div>
            <div class="form_item">
                <label>零件图片</label>
                <input type="file" name="image" accept="image/*">
            </div>
            <button type="submit">提交</button>
        </form>

        <div class="back">
            <a href="{% url 'machine :machine_list' %">返回列表</a>
        </div>
    </div>














</body>
</html>
